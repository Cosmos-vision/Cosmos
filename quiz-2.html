<style>
  :root {
    --void: #07060f;
    --deep: #0d0b1a;
    --surface: #131128;
    --muted: #1e1b35;
    --border: rgba(255,255,255,0.07);
    --border-sel: rgba(127,119,221,0.6);
    --purple: #7F77DD;
    --purple-light: #AFA9EC;
    --purple-glow: rgba(127,119,221,0.15);
    --rose: #D4537E;
    --teal: #1D9E75;
    --text: #F0EEF8;
    --text-muted: #8B87B0;
    --text-faint: #4A4870;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--void);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* CANVAS */
  #cosmos-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* LAYOUT */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* NAV */
  nav {
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(7,6,15,0.6);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    font-size: 1rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--text); text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .logo-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--purple);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)}
  }
  .nav-right {
    font-size: 0.7rem; color: #AFA9EC;
    letter-spacing: 0.08em;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0 1.5rem;
    background: rgba(7,6,15,0.4);
    backdrop-filter: blur(8px);
  }
  .progress-inner {
    max-width: 580px; margin: 0 auto;
    padding: 0.75rem 0;
    display: flex; align-items: center; gap: 12px;
  }
  .progress-track {
    flex: 1; height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--purple);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-label {
    font-size: 0.65rem; color: var(--text-faint);
    letter-spacing: 0.1em; white-space: nowrap;
    min-width: 48px; text-align: right;
  }

  /* SCENE DOTS */
  .dots-wrap {
    display: flex; gap: 5px; justify-content: center;
    padding: 0.6rem 0;
  }
  .scene-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: all 0.3s ease;
  }
  .scene-dot.done { background: var(--purple); }
  .scene-dot.active { background: var(--purple-light); width: 16px; border-radius: 2px; }

  /* MAIN CONTENT */
  .main {
    flex: 1; display: flex; align-items: flex-start;
    justify-content: center;
    padding: 2rem 1.5rem 5rem;
  }
  .scene-card {
    width: 100%; max-width: 580px;
    animation: sceneIn 0.45s cubic-bezier(0.4,0,0.2,1) both;
  }
  @keyframes sceneIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* DIMENSION TAGS */
  .dim-row {
    display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .dim-tag {
    font-size: 0.62rem; padding: 3px 10px; border-radius: 20px;
    font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* SCENE TITLE */
  .scene-num {
    font-size: 0.62rem; color: #AFA9EC;
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .scene-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 300; line-height: 1.25;
    color: var(--text); margin-bottom: 0.9rem;
  }
  .scene-desc {
    font-size: 0.88rem; color: var(--text-muted);
    line-height: 1.8; margin-bottom: 1.75rem;
    border-left: 1.5px solid rgba(127,119,221,0.2);
    padding-left: 1rem;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }

  .opt-btn {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; text-align: left;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
  }
  .opt-btn:hover {
    background: rgba(127,119,221,0.08);
    border-color: rgba(127,119,221,0.3);
  }
  .opt-btn:active { transform: scale(0.99); }

  /* SELECTED STATE */
  .opt-btn.selected {
    background: rgba(127,119,221,0.14);
    border-color: var(--purple);
  }
  .opt-btn.selected .opt-check {
    background: var(--purple);
    border-color: var(--purple);
  }
  .opt-btn.selected .opt-check svg { opacity: 1; }
  .opt-btn.selected .opt-text { color: var(--text); }

  .opt-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    background: transparent;
  }
  .opt-check svg {
    width: 10px; height: 8px; opacity: 0;
    transition: opacity 0.15s;
  }
  .opt-text {
    font-size: 0.85rem; color: #C8C4E8;
    line-height: 1.5; transition: color 0.18s;
  }

  /* NAVIGATION */
  .nav-btns {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .btn-back {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px; padding: 0.65rem 1.25rem;
    color: #AFA9EC; font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; cursor: pointer;
    transition: all 0.18s;
  }
  .btn-back:hover { border-color: rgba(255,255,255,0.25); color: var(--text-muted); }

  .btn-next {
    background: var(--purple);
    border: none; border-radius: 100px;
    padding: 0.75rem 2rem;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 500; cursor: pointer;
    transition: all 0.18s;
    opacity: 0.35; pointer-events: none;
  }
  .btn-next.ready { opacity: 1; pointer-events: auto; }
  .btn-next.ready:hover { background: #6B62CC; transform: translateY(-1px); }
  .btn-next.ready:active { transform: translateY(0); }

  /* LOADING STATE */
  .loading-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; text-align: center;
    padding: 2rem;
  }
  .loading-screen.visible { display: flex; }
  .loading-orb {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--muted);
    border: 1.5px solid var(--purple);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem; position: relative;
    animation: float 3s ease-in-out infinite;
  }
  .loading-orb::before {
    content:''; position:absolute;
    width: 100px; height: 100px; border-radius: 50%;
    border: 1px solid rgba(127,119,221,0.2);
    animation: spin 8s linear infinite;
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
  }
  .loading-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 300;
    margin-bottom: 0.5rem;
  }
  .loading-sub {
    font-size: 0.8rem; color: #AFA9EC;
    letter-spacing: 0.05em;
  }
  .loading-dots {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 1rem;
  }
  .loading-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--purple); opacity: 0.3;
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%,80%,100%{opacity:0.3;transform:scale(0.8)}
    40%{opacity:1;transform:scale(1)}
  }

  @media(max-width:480px){
    .main{ padding: 1.5rem 1rem 5rem; }
    nav { padding: 0.9rem 1rem; }
  }
</style>

(function(){
  var c=document.getElementById('cosmos-canvas'),
      ctx=c.getContext('2d'),stars=[],W,H;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function make(n){
    stars=[];
    for(var i=0;i<n;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.1+0.2,
      a:Math.random()*0.7+0.1,
      sp:Math.random()*0.003+0.001,
      ph:Math.random()*Math.PI*2,
      col:Math.random()>0.93?'rose':Math.random()>0.87?'purple':'white'
    });
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    stars.forEach(function(s){
      var al=(Math.sin(t*s.sp+s.ph)+1)/2*s.a;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      if(s.col==='rose') ctx.fillStyle='rgba(212,83,126,'+al+')';
      else if(s.col==='purple') ctx.fillStyle='rgba(175,169,236,'+al+')';
      else ctx.fillStyle='rgba(255,255,255,'+al+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); make(180);
  window.addEventListener('resize',function(){resize();make(180);});
  requestAnimationFrame(draw);
})();

var currentScene = 0;
var answers = new Array(9).fill(null);
var userData = {};

/* ══════════════════════════════════════════
   RENDU DES POINTS DE PROGRESSION
══════════════════════════════════════════ */
function renderDots() {
  var wrap = document.getElementById('dots-wrap');
  wrap.innerHTML = '';
  for (var i = 0; i < 9; i++) {
    var d = document.createElement('div');
    d.className = 'scene-dot' +
      (i < currentScene ? ' done' : i === currentScene ? ' active' : '');
    wrap.appendChild(d);
  }
}

/* ══════════════════════════════════════════
   RENDU D'UNE SCÈNE
══════════════════════════════════════════ */
function renderScene(index) {
  var s = SCENES[index];
  var selected = answers[index];
  var isLast = index === 8;

  /* Progression */
  var pct = Math.round((index / 9) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = (index + 1) + ' / 9';
  document.getElementById('nav-label').textContent =
    userData.prenom ? 'Bonjour ' + userData.prenom : 'Exploration';

  renderDots();

  /* HTML de la scène */
  var dimsHTML = s.dims.map(function(d) {
    return '<span class="dim-tag" style="background:' + d.bg +
           ';color:' + d.tc + '">' + d.l + '</span>';
  }).join('');

  var optsHTML = s.opts.map(function(opt, i) {
    var isSel = selected === i;
    return '<button class="opt-btn' + (isSel ? ' selected' : '') +
           '" data-idx="' + i + '" type="button">' +
      '<span class="opt-check">' +
        '<svg viewBox="0 0 10 8" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
          '<path d="M1 4L3.5 6.5L9 1"/>' +
        '</svg>' +
      '</span>' +
      '<span class="opt-text">' + opt + '</span>' +
    '</button>';
  }).join('');

  var backHTML = index > 0
    ? '<button class="btn-back" id="btn-back" type="button">← Précédent</button>'
    : '<span></span>';

  var nextLabel = isLast ? 'Voir mon profil →' : 'Suivant →';
  var nextReady = selected !== null ? ' ready' : '';

  var html =
    '<div class="dim-row">' + dimsHTML + '</div>' +
    '<p class="scene-num">Scène ' + (index + 1) + ' sur 9</p>' +
    '<h2 class="scene-title">' + s.title + '</h2>' +
    '<p class="scene-desc">' + s.desc + '</p>' +
    '<div class="options">' + optsHTML + '</div>' +
    '<div class="nav-btns">' +
      backHTML +
      '<button class="btn-next' + nextReady + '" id="btn-next" type="button">' +
        nextLabel +
      '</button>' +
    '</div>';

  var card = document.getElementById('scene-card');
  card.style.animation = 'none';
  card.offsetHeight; /* reflow */
  card.style.animation = '';
  card.innerHTML = html;

  /* ÉVÉNEMENTS OPTIONS */
  card.querySelectorAll('.opt-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-idx'));
      answers[currentScene] = idx;

      /* Mise à jour visuelle */
      card.querySelectorAll('.opt-btn').forEach(function(b) {
        b.classList.remove('selected');
      });
      this.classList.add('selected');

      /* Activer le bouton suivant */
      var nextBtn = document.getElementById('btn-next');
      if (nextBtn) nextBtn.classList.add('ready');
    });
  });

  /* ÉVÉNEMENT SUIVANT */
  var nextBtn = document.getElementById('btn-next');
  if (nextBtn) {
    nextBtn.addEventListener('click', function() {
      if (answers[currentScene] === null) return;

if (typeof gtag === 'function') {
  gtag('event', 'quiz_question_complete', {
    question: currentScene + 1
    });
  }
      if (currentScene < 8) {
        currentScene++;
        renderScene(currentScene);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        finishQuiz();
      }
    });
  }

  /* ÉVÉNEMENT PRÉCÉDENT */
  var backBtn = document.getElementById('btn-back');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      if (currentScene > 0) {
        currentScene--;
        renderScene(currentScene);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  }
}

/* ══════════════════════════════════════════
   FIN DU QUIZ
══════════════════════════════════════════ */
  function finishQuiz() {
    if (typeof gtag === 'function') {
    gtag('event', 'quiz_complete');
    }
    
    /* Cacher la scène, montrer le loading */
  document.getElementById('scene-card').style.display = 'none';
  document.getElementById('loading-screen').classList.add('visible');
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Analyse…';

  /* Sauvegarder les réponses */
  var quizData = {
    user: userData,
    answers: answers,
    completedAt: new Date().toISOString()
  };
  try {
    sessionStorage.setItem('cosmos_quiz', JSON.stringify(quizData));
  } catch(e) {}

  /* Redirection vers la page résultat après 2.5s */
    setTimeout(function() {
    window.location.href = 'approfondissement.html';
  }, 5000);
}

/* ══════════════════════════════════════════
   INITIALISATION
══════════════════════════════════════════ */
renderScene(0);

if (typeof gtag === 'function') {
  gtag('event', 'quiz_start');
}
</script>
